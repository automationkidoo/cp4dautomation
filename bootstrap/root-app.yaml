apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cp4d-root
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/automationkidoo/cp4dautomation
    path: environments/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
